<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">

<style>
.robot-eye{
  animation: blink 4s infinite;
}

@keyframes blink{
  0%,90%,100%{r:6;}
  95%{r:1;}
}

.brain-pulse{
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{opacity:0.2;}
  50%{opacity:0.8;}
  100%{opacity:0.2;}
}

.wave{
  stroke-dasharray:8;
  animation:waveMove 3s linear infinite;
}

@keyframes waveMove{
  from{stroke-dashoffset:0;}
  to{stroke-dashoffset:40;}
}

.chat{
  animation:chatMove 3s ease-in-out infinite alternate;
}

@keyframes chatMove{
  from{transform:translateY(0px);}
  to{transform:translateY(-6px);}
}

</style>

<!-- Background -->
<rect width="1000" height="520" fill="#0f172a"/>

<!-- AI Brain Glow -->
<circle cx="720" cy="120" r="70" fill="#2563eb" opacity="0.15" class="brain-pulse"/>

<!-- Neural Network Lines -->
<line x1="700" y1="120" x2="740" y2="90" stroke="#38bdf8" stroke-width="2" class="wave"/>
<line x1="740" y1="90" x2="770" y2="130" stroke="#38bdf8" stroke-width="2" class="wave"/>
<line x1="770" y1="130" x2="700" y2="120" stroke="#38bdf8" stroke-width="2" class="wave"/>

<!-- Table -->
<rect x="380" y="340" width="240" height="12" fill="#475569"/>

<!-- HUMAN -->

<!-- Head -->
<circle cx="420" cy="250" r="35" fill="#f1c27d"/>

<!-- Body -->
<rect x="400" y="285" width="40" height="80" rx="10" fill="#3b82f6"/>

<!-- Arms -->
<line x1="400" y1="300" x2="360" y2="340" stroke="#f1c27d" stroke-width="6"/>
<line x1="440" y1="300" x2="480" y2="340" stroke="#f1c27d" stroke-width="6"/>

<!-- Laptop -->
<rect x="470" y="325" width="60" height="30" rx="4" fill="#94a3b8"/>

<!-- ROBOT -->

<!-- Head -->
<rect x="600" y="220" width="80" height="70" rx="12" fill="#38bdf8"/>

<!-- Eyes -->
<circle cx="625" cy="250" r="6" fill="#0f172a" class="robot-eye"/>
<circle cx="655" cy="250" r="6" fill="#0f172a" class="robot-eye"/>

<!-- Antenna -->
<line x1="640" y1="220" x2="640" y2="200" stroke="#38bdf8" stroke-width="4"/>
<circle cx="640" cy="195" r="6" fill="#38bdf8"/>

<!-- Robot Body -->
<rect x="600" y="300" width="80" height="80" rx="10" fill="#0ea5e9"/>

<!-- Arms -->
<line x1="600" y1="310" x2="560" y2="340" stroke="#38bdf8" stroke-width="6"/>
<line x1="680" y1="310" x2="720" y2="340" stroke="#38bdf8" stroke-width="6"/>

<!-- Chat Bubble Robot -->
<g class="chat">
<rect x="590" y="150" width="180" height="55" rx="10" fill="#1e293b"/>
<text x="680" y="182" fill="#38bdf8" font-size="16" text-anchor="middle" font-family="Arial">
Tell me about yourself
</text>
</g>

<!-- Chat Bubble Human -->
<g class="chat">
<rect x="300" y="150" width="170" height="55" rx="10" fill="#1e293b"/>
<text x="385" y="182" fill="#60a5fa" font-size="16" text-anchor="middle" font-family="Arial">
I'm ready for the interview
</text>
</g>

</svg>
